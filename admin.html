<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Street Scentz — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #4A90E2;
  --bronze: #1A3A8F;
  --cream: #B8D4F0;
  --bg: #05060C;
  --card: rgba(10,18,40,.65);
  --border: rgba(74,144,226,.2);
  --border-h: rgba(74,144,226,.5);
  --text: #B8D4F0;
  --text-dim: rgba(184,212,240,.55);
  --danger: #e74c3c;
  --success: #27ae60;
  --warn: #f39c12;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Barlow',sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; overflow-x:hidden;
}

/* ── BG SLIDESHOW ── */
.admin-bg-layer {
  position:fixed; inset:0; z-index:-1;
  background-size:cover; background-position:center; background-repeat:no-repeat;
  transition:opacity 1.8s ease;
}
.admin-bg-layer.hidden { opacity:0; }
.admin-bg-tint {
  position:fixed; inset:0; z-index:-1;
  background:rgba(5,6,12,.72);
}

/* ── LOADING SCREEN ── */
#loading-screen {
  position:fixed; inset:0; z-index:99999; background:#020408;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:opacity .8s ease;
}
#loading-screen.done { opacity:0; pointer-events:none; }
#loading-canvas {
  position:absolute; inset:0; width:100%; height:100%; z-index:1;
}
#loading-zia {
  position:relative; z-index:2; width:min(320px,55vw); height:auto;
  filter:drop-shadow(0 0 30px rgba(74,200,255,.5));
  animation:ziaGlow 2s ease-in-out infinite alternate;
}
@keyframes ziaGlow {
  0%{filter:drop-shadow(0 0 20px rgba(74,200,255,.3)) brightness(0.8);}
  100%{filter:drop-shadow(0 0 50px rgba(74,200,255,.8)) brightness(1.3);}
}
#loading-text-img {
  position:relative; z-index:2; width:min(380px,65vw); height:auto;
  margin-top:24px; opacity:0;
  transition:opacity 1.5s ease, filter 1.5s ease;
  filter:brightness(0);
}
#loading-text-img.lit {
  opacity:1; filter:brightness(1.2) drop-shadow(0 0 20px rgba(74,200,255,.7));
}
#loading-pct {
  position:relative; z-index:2; margin-top:20px;
  font-family:'Cinzel',serif; font-size:1.8rem; color:rgba(74,200,255,.9);
  letter-spacing:.15em; text-shadow:0 0 15px rgba(74,200,255,.5);
}
#loading-noise {
  position:absolute; inset:0; z-index:3; pointer-events:none;
  background:repeating-linear-gradient(transparent 0,rgba(255,255,255,.02) 2px,transparent 3px);
  mix-blend-mode:overlay; opacity:.6;
  animation:noiseShift .15s steps(4) infinite;
}
@keyframes noiseShift {
  0%{transform:translateY(0)}
  25%{transform:translateY(-2px)}
  50%{transform:translateY(1px)}
  75%{transform:translateY(-1px)}
  100%{transform:translateY(0)}
}

/* ── PIN GATE ── */
.pin-gate {
  position:fixed; inset:0; z-index:9999; display:flex; align-items:center; justify-content:center;
  background:var(--bg);
}
.pin-gate.hidden { display:none; }
.pin-box {
  text-align:center; background:var(--card); border:1px solid var(--border);
  padding:3rem 2.5rem; border-radius:16px;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
}
.pin-box h1 { font-family:'Cinzel',serif; font-size:1.6rem; color:var(--gold); margin-bottom:.4rem; }
.pin-box p { color:var(--text-dim); font-size:.88rem; margin-bottom:1.5rem; }
.pin-input {
  width:200px; padding:12px 16px; text-align:center; font-size:1.5rem; letter-spacing:.5em;
  background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:10px;
  color:var(--cream); font-family:'Barlow',sans-serif; outline:none;
}
.pin-input:focus { border-color:var(--gold); }
.pin-input.shake { animation:pinShake .4s; }
@keyframes pinShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.pin-err { color:var(--danger); font-size:.82rem; margin-top:.8rem; min-height:1.2em; }

/* ── DASHBOARD LAYOUT ── */
.dash { display:none; }
.dash.active { display:block; }
.dash-header {
  display:flex; align-items:center; justify-content:space-between; padding:1.2rem 2rem;
  border-bottom:1px solid var(--border); backdrop-filter:blur(10px);
  position:sticky; top:0; z-index:100; background:rgba(5,6,12,.85);
}
.dash-logo { font-family:'Cinzel',serif; font-size:1.3rem; color:var(--gold); }
.dash-logo span { color:var(--cream); font-weight:400; }
.dash-tabs { display:flex; gap:0; }
.dash-tab {
  padding:.7rem 1.3rem; font-size:.82rem; font-weight:600; text-transform:uppercase;
  letter-spacing:.06em; color:var(--text-dim); cursor:pointer; border:none; background:none;
  border-bottom:2px solid transparent; transition:all .25s;
}
.dash-tab:hover { color:var(--cream); }
.dash-tab.active { color:var(--gold); border-bottom-color:var(--gold); }
.dash-logout { background:none; border:1px solid var(--border); color:var(--text-dim);
  padding:.5rem 1rem; border-radius:8px; cursor:pointer; font-size:.78rem; transition:all .25s; }
.dash-logout:hover { border-color:var(--danger); color:var(--danger); }

.dash-body { padding:2rem; max-width:1400px; margin:0 auto; }
.panel { display:none; }
.panel.active { display:block; }
.panel-title { font-family:'Cinzel',serif; font-size:1.4rem; color:var(--gold); margin-bottom:1.5rem; }

/* ── CARDS ── */
.stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1.2rem; margin-bottom:2rem; }
.stat-card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:1.5rem; backdrop-filter:blur(16px); transition:border-color .3s;
}
.stat-card:hover { border-color:var(--border-h); }
.stat-label { font-size:.72rem; text-transform:uppercase; letter-spacing:.1em; color:var(--text-dim); margin-bottom:.5rem; }
.stat-val { font-family:'Cinzel',serif; font-size:1.8rem; color:var(--cream); }
.stat-val.green { color:var(--success); }

/* ── TABLE ── */
.adm-table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { text-align:left; font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);
  padding:.8rem 1rem; border-bottom:1px solid var(--border); }
td { padding:.8rem 1rem; border-bottom:1px solid rgba(74,144,226,.08); font-size:.88rem; vertical-align:top; }
tr:hover td { background:rgba(74,144,226,.04); }

/* ── BADGES ── */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
.badge-new { background:rgba(74,144,226,.15); color:#4A90E2; }
.badge-shipped { background:rgba(243,156,18,.15); color:#f39c12; }
.badge-delivered { background:rgba(39,174,96,.15); color:#27ae60; }

/* ── ORDER DETAIL ── */
.order-detail { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; margin-top:1rem; }
.order-detail h3 { font-family:'Cinzel',serif; color:var(--gold); margin-bottom:1rem; }
.order-detail .od-row { display:flex; justify-content:space-between; padding:.3rem 0; font-size:.88rem; }
.order-detail .od-label { color:var(--text-dim); }

/* ── FORMS ── */
.adm-input {
  padding:10px 14px; background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:8px; color:var(--cream); font-family:'Barlow',sans-serif; font-size:.9rem; outline:none;
  transition:border-color .3s;
}
.adm-input:focus { border-color:var(--gold); }
.adm-btn {
  padding:10px 20px; background:var(--gold); color:#fff; border:none; border-radius:8px;
  font-family:'Barlow',sans-serif; font-weight:600; font-size:.85rem; cursor:pointer;
  transition:all .25s; text-transform:uppercase; letter-spacing:.05em;
}
.adm-btn:hover { background:#3a7bd5; transform:translateY(-1px); }
.adm-btn.danger { background:var(--danger); }
.adm-btn.danger:hover { background:#c0392b; }
.adm-btn.sm { padding:6px 14px; font-size:.76rem; }
.adm-btn.outline { background:none; border:1px solid var(--border); color:var(--text-dim); }
.adm-btn.outline:hover { border-color:var(--gold); color:var(--gold); }

.form-row { display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap; margin-bottom:1.5rem; }
.form-group { display:flex; flex-direction:column; gap:.3rem; }
.form-group label { font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim); }

/* ── TOP SELLERS ── */
.top-list { list-style:none; }
.top-list li { display:flex; justify-content:space-between; padding:.6rem 0; border-bottom:1px solid rgba(74,144,226,.08); font-size:.9rem; }
.top-list li:last-child { border:none; }
.top-rank { color:var(--gold); font-weight:700; margin-right:.8rem; width:1.5rem; }

/* ── INVENTORY ── */
.inv-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:1rem; }
.inv-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.2rem; }
.inv-name { font-weight:600; margin-bottom:.6rem; }
.inv-card .adm-input { width:80px; text-align:center; }

/* ── PROMO LIST ── */
.promo-row { display:flex; align-items:center; gap:1rem; padding:.7rem 0; border-bottom:1px solid rgba(74,144,226,.08); }
.promo-code { font-weight:700; font-family:'Cinzel',serif; color:var(--gold); min-width:140px; }
.promo-disc { color:var(--cream); min-width:60px; }
.promo-status { min-width:60px; }
.promo-actions { margin-left:auto; display:flex; gap:.5rem; }

/* ── SETTINGS ── */
.settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; max-width:700px; }
.settings-grid .form-group { width:100%; }
.settings-grid .adm-input { width:100%; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .dash-header { flex-wrap:wrap; gap:.8rem; }
  .dash-tabs { flex-wrap:wrap; gap:0; }
  .dash-tab { padding:.5rem .8rem; font-size:.75rem; }
  .dash-body { padding:1rem; }
  .stat-grid { grid-template-columns:1fr 1fr; }
  .settings-grid { grid-template-columns:1fr; }
  .form-row { flex-direction:column; }
}
@media(max-width:480px){
  .stat-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <canvas id="loading-canvas"></canvas>
  <img id="loading-zia" src="New Assets/Loading_Zia.png" alt=""/>
  <img id="loading-text-img" src="New Assets/Loading_Text.png" alt=""/>
  <div id="loading-pct">0%</div>
  <div id="loading-noise"></div>
</div>

<!-- BG SLIDESHOW -->
<div class="admin-bg-layer" id="admin-bg-a"></div>
<div class="admin-bg-layer hidden" id="admin-bg-b"></div>
<div class="admin-bg-tint"></div>

<!-- PIN GATE -->
<div class="pin-gate" id="pin-gate">
  <div class="pin-box">
    <h1>STREET SCENTZ</h1>
    <p>Admin Dashboard</p>
    <input class="pin-input" id="pin-input" type="password" maxlength="4" placeholder="----" inputmode="numeric" autocomplete="off"/>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <header class="dash-header">
    <div class="dash-logo">STREET <span>SCENTZ</span> &mdash; Admin</div>
    <div class="dash-tabs" id="dash-tabs">
      <button class="dash-tab active" data-panel="orders">Orders</button>
      <button class="dash-tab" data-panel="revenue">Revenue</button>
      <button class="dash-tab" data-panel="inventory">Inventory</button>
      <button class="dash-tab" data-panel="promos">Promos</button>
      <button class="dash-tab" data-panel="customers">Customers</button>
      <button class="dash-tab" data-panel="settings">Settings</button>
    </div>
    <button class="dash-logout" onclick="logout()">Logout</button>
  </header>

  <div class="dash-body">

    <!-- ORDERS -->
    <div class="panel active" id="panel-orders">
      <h2 class="panel-title">Orders</h2>
      <div class="adm-table-wrap">
        <table>
          <thead><tr><th>Order #</th><th>Date</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th></th></tr></thead>
          <tbody id="orders-tbody"></tbody>
        </table>
      </div>
      <div id="order-detail-area"></div>
    </div>

    <!-- REVENUE -->
    <div class="panel" id="panel-revenue">
      <h2 class="panel-title">Revenue</h2>
      <div class="stat-grid" id="rev-cards"></div>
      <h3 style="font-family:'Cinzel',serif;color:var(--gold);margin-bottom:1rem;">Top Sellers</h3>
      <ul class="top-list" id="top-sellers"></ul>
    </div>

    <!-- INVENTORY -->
    <div class="panel" id="panel-inventory">
      <h2 class="panel-title">Inventory</h2>
      <div class="inv-grid" id="inv-grid"></div>
      <div style="margin-top:1.5rem"><button class="adm-btn" onclick="saveInventory()">Save Inventory</button></div>
    </div>

    <!-- PROMOS -->
    <div class="panel" id="panel-promos">
      <h2 class="panel-title">Promo Codes</h2>
      <div class="form-row">
        <div class="form-group"><label>Code</label><input class="adm-input" id="new-promo-code" placeholder="SUMMER25" maxlength="20"/></div>
        <div class="form-group"><label>Discount %</label><input class="adm-input" id="new-promo-disc" type="number" min="1" max="100" placeholder="25" style="width:80px"/></div>
        <button class="adm-btn" onclick="createPromo()">Create</button>
      </div>
      <div id="promo-list"></div>
    </div>

    <!-- CUSTOMERS -->
    <div class="panel" id="panel-customers">
      <h2 class="panel-title">Customers</h2>
      <div class="adm-table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Orders</th><th>Total Spent</th></tr></thead>
          <tbody id="customers-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="panel" id="panel-settings">
      <h2 class="panel-title">Settings</h2>
      <div class="settings-grid">
        <div class="form-group"><label>Store Name</label><input class="adm-input" id="set-name" value="Street Scentz"/></div>
        <div class="form-group"><label>Contact Email</label><input class="adm-input" id="set-email" type="email"/></div>
        <div class="form-group"><label>Phone</label><input class="adm-input" id="set-phone" type="tel"/></div>
        <div class="form-group"><label>Tax Rate %</label><input class="adm-input" id="set-tax" type="number" step="0.01" min="0" max="30"/></div>
        <div class="form-group"><label>Flat Shipping Rate ($)</label><input class="adm-input" id="set-shipping" type="number" step="0.01" min="0"/></div>
      </div>
      <div style="margin-top:1.5rem"><button class="adm-btn" onclick="saveSettings()">Save Settings</button></div>
    </div>

  </div>
</div>

<script>
const ADMIN_PIN = '1025';
const FLAVORS = ['Horchata','Fresas con Crema','Jamaica','Mango Chile','Melon Pina','Sandia'];

/* ── PIN ── */
const pinInput = document.getElementById('pin-input');
pinInput.addEventListener('input', () => {
  if (pinInput.value.length === 4) {
    if (pinInput.value === ADMIN_PIN) {
      document.getElementById('pin-gate').classList.add('hidden');
      document.getElementById('dash').classList.add('active');
      loadPanel('orders');
    } else {
      document.getElementById('pin-err').textContent = 'Wrong PIN';
      pinInput.classList.add('shake');
      setTimeout(() => { pinInput.classList.remove('shake'); pinInput.value = ''; }, 500);
    }
  }
});
pinInput.focus();

function logout() {
  document.getElementById('dash').classList.remove('active');
  document.getElementById('pin-gate').classList.remove('hidden');
  pinInput.value = '';
  document.getElementById('pin-err').textContent = '';
  pinInput.focus();
}

/* ── TABS ── */
document.getElementById('dash-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.dash-tab');
  if (!tab) return;
  document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  const id = tab.dataset.panel;
  document.getElementById('panel-' + id).classList.add('active');
  loadPanel(id);
});

function loadPanel(id) {
  const loaders = { orders: loadOrders, revenue: loadRevenue, inventory: loadInventory, promos: loadPromos, customers: loadCustomers, settings: loadSettings };
  if (loaders[id]) loaders[id]();
}

function fmt(n) { return '$' + Number(n).toFixed(2); }
function fmtDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}

/* ── ORDERS ── */
async function loadOrders() {
  const orders = await fetch('/api/orders').then(r => r.json()).catch(() => []);
  const tbody = document.getElementById('orders-tbody');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-dim);padding:2rem">No orders yet</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td style="font-weight:600;color:var(--gold)">${o.id}</td>
      <td>${fmtDate(o.createdAt)}</td>
      <td>${o.customer?.name || '-'}</td>
      <td>${(o.items||[]).length} item${(o.items||[]).length!==1?'s':''}</td>
      <td style="font-weight:600">${fmt(o.total)}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td><button class="adm-btn sm outline" onclick="viewOrder('${o.id}')">View</button></td>
    </tr>`).join('');
}

async function viewOrder(id) {
  const orders = await fetch('/api/orders').then(r => r.json()).catch(() => []);
  const o = orders.find(x => x.id === id);
  if (!o) return;
  const area = document.getElementById('order-detail-area');
  area.innerHTML = `
    <div class="order-detail">
      <h3>Order ${o.id}</h3>
      <div class="od-row"><span class="od-label">Customer</span><span>${o.customer?.name||'-'}</span></div>
      <div class="od-row"><span class="od-label">Email</span><span>${o.customer?.email||'-'}</span></div>
      <div class="od-row"><span class="od-label">Address</span><span>${o.customer?.address||''}, ${o.customer?.city||''}, ${o.customer?.state||''} ${o.customer?.zip||''}</span></div>
      <div class="od-row"><span class="od-label">Items</span><span>${(o.items||[]).map(i=>`${i.name} x${i.qty}`).join(', ')}</span></div>
      <div class="od-row"><span class="od-label">Subtotal</span><span>${fmt(o.subtotal)}</span></div>
      ${o.discount ? `<div class="od-row"><span class="od-label">Discount (${o.promoCode||''})</span><span style="color:#6fcf97">-${fmt(o.discount)}</span></div>` : ''}
      <div class="od-row"><span class="od-label">Shipping</span><span>${o.shipping===0?'FREE':fmt(o.shipping)}</span></div>
      <div class="od-row"><span class="od-label">Total</span><span style="font-weight:700;font-size:1.1rem">${fmt(o.total)}</span></div>
      <div class="od-row"><span class="od-label">Stripe ID</span><span style="font-size:.78rem;color:var(--text-dim)">${o.stripePaymentId||'-'}</span></div>
      <div style="margin-top:1.2rem;display:flex;gap:.6rem">
        <button class="adm-btn sm ${o.status==='new'?'':'outline'}" onclick="updateStatus('${o.id}','new')">New</button>
        <button class="adm-btn sm ${o.status==='shipped'?'':'outline'}" onclick="updateStatus('${o.id}','shipped')">Shipped</button>
        <button class="adm-btn sm ${o.status==='delivered'?'':'outline'}" onclick="updateStatus('${o.id}','delivered')">Delivered</button>
      </div>
    </div>`;
}

async function updateStatus(id, status) {
  await fetch('/api/orders/' + id, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
  loadOrders();
  viewOrder(id);
}

/* ── REVENUE ── */
async function loadRevenue() {
  const s = await fetch('/api/stats').then(r => r.json()).catch(() => ({}));
  document.getElementById('rev-cards').innerHTML = `
    <div class="stat-card"><div class="stat-label">Today</div><div class="stat-val green">${fmt(s.today||0)}</div></div>
    <div class="stat-card"><div class="stat-label">This Week</div><div class="stat-val green">${fmt(s.week||0)}</div></div>
    <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-val green">${fmt(s.month||0)}</div></div>
    <div class="stat-card"><div class="stat-label">All Time</div><div class="stat-val green">${fmt(s.total||0)}</div></div>
    <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-val">${s.orderCount||0}</div></div>
    <div class="stat-card"><div class="stat-label">Avg Order Value</div><div class="stat-val">${fmt(s.avgValue||0)}</div></div>`;
  const list = document.getElementById('top-sellers');
  if ((s.topSellers||[]).length === 0) {
    list.innerHTML = '<li style="color:var(--text-dim)">No sales data yet</li>';
  } else {
    list.innerHTML = s.topSellers.map((t,i) =>
      `<li><span><span class="top-rank">${i+1}.</span>${t.name}</span><span style="color:var(--gold);font-weight:600">${t.qty} sold</span></li>`
    ).join('');
  }
}

/* ── INVENTORY ── */
function loadInventory() {
  const inv = JSON.parse(localStorage.getItem('ss-inventory') || '{}');
  document.getElementById('inv-grid').innerHTML = FLAVORS.map(f => `
    <div class="inv-card">
      <div class="inv-name">${f}</div>
      <label style="font-size:.72rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em">Stock</label>
      <input class="adm-input" type="number" min="0" data-flavor="${f}" value="${inv[f]||0}" style="margin-top:.3rem"/>
    </div>`).join('');
}

function saveInventory() {
  const inv = {};
  document.querySelectorAll('#inv-grid input[data-flavor]').forEach(el => {
    inv[el.dataset.flavor] = parseInt(el.value) || 0;
  });
  localStorage.setItem('ss-inventory', JSON.stringify(inv));
  alert('Inventory saved');
}

/* ── PROMOS ── */
async function loadPromos() {
  const promos = await fetch('/api/promos').then(r => r.json()).catch(() => []);
  const list = document.getElementById('promo-list');
  if (promos.length === 0) {
    list.innerHTML = '<div style="color:var(--text-dim);padding:1rem 0">No promo codes yet</div>';
    return;
  }
  list.innerHTML = promos.map(p => `
    <div class="promo-row">
      <span class="promo-code">${p.code}</span>
      <span class="promo-disc">${p.discount}% off</span>
      <span class="promo-status"><span class="badge ${p.active?'badge-delivered':'badge-shipped'}">${p.active?'Active':'Inactive'}</span></span>
      <span class="promo-actions">
        <button class="adm-btn sm outline" onclick="togglePromo('${p.code}',${!p.active})">${p.active?'Disable':'Enable'}</button>
        <button class="adm-btn sm danger" onclick="deletePromo('${p.code}')">Delete</button>
      </span>
    </div>`).join('');
}

async function createPromo() {
  const code = document.getElementById('new-promo-code').value.trim();
  const discount = document.getElementById('new-promo-disc').value;
  if (!code || !discount) { alert('Enter code and discount %'); return; }
  const res = await fetch('/api/promo', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({code,discount}) });
  if (!res.ok) { const d = await res.json(); alert(d.error||'Error'); return; }
  document.getElementById('new-promo-code').value = '';
  document.getElementById('new-promo-disc').value = '';
  loadPromos();
}

async function togglePromo(code, active) {
  await fetch('/api/promo/' + code, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({active}) });
  loadPromos();
}

async function deletePromo(code) {
  if (!confirm('Delete promo ' + code + '?')) return;
  await fetch('/api/promo/' + code, { method:'DELETE' });
  loadPromos();
}

/* ── CUSTOMERS ── */
async function loadCustomers() {
  const orders = await fetch('/api/orders').then(r => r.json()).catch(() => []);
  const map = {};
  orders.forEach(o => {
    const email = o.customer?.email;
    if (!email) return;
    if (!map[email]) map[email] = { name: o.customer.name||'-', email, orders:0, spent:0 };
    map[email].orders++;
    map[email].spent += o.total || 0;
    if (o.customer.name) map[email].name = o.customer.name;
  });
  const customers = Object.values(map).sort((a,b) => b.spent - a.spent);
  const tbody = document.getElementById('customers-tbody');
  if (customers.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-dim);padding:2rem">No customers yet</td></tr>';
    return;
  }
  tbody.innerHTML = customers.map(c => `
    <tr>
      <td>${c.name}</td>
      <td>${c.email}</td>
      <td>${c.orders}</td>
      <td style="font-weight:600">${fmt(c.spent)}</td>
    </tr>`).join('');
}

/* ── SETTINGS ── */
function loadSettings() {
  const s = JSON.parse(localStorage.getItem('ss-settings') || '{}');
  document.getElementById('set-name').value = s.name || 'Street Scentz';
  document.getElementById('set-email').value = s.email || '';
  document.getElementById('set-phone').value = s.phone || '';
  document.getElementById('set-tax').value = s.tax || 0;
  document.getElementById('set-shipping').value = s.shipping || 4.99;
}

function saveSettings() {
  const s = {
    name: document.getElementById('set-name').value,
    email: document.getElementById('set-email').value,
    phone: document.getElementById('set-phone').value,
    tax: parseFloat(document.getElementById('set-tax').value) || 0,
    shipping: parseFloat(document.getElementById('set-shipping').value) || 0
  };
  localStorage.setItem('ss-settings', JSON.stringify(s));
  alert('Settings saved');
}

(function(){

/* ══════════════════════════════════════════════
   ZIA PARTICLE REACTOR — Loading Screen
   4k GPU particles, GLSL shaders, controlled bloom
   ══════════════════════════════════════════════ */
(function(){
  var screen = document.getElementById('loading-screen');
  var canvas = document.getElementById('loading-canvas');
  var zia    = document.getElementById('loading-zia');
  var textImg= document.getElementById('loading-text-img');
  var pctEl  = document.getElementById('loading-pct');
  if(!screen||!canvas) return;

  var gl = canvas.getContext('webgl2') || canvas.getContext('webgl');
  if(!gl){ screen.classList.add('done'); return; }

  /* ── constants ── */
  var PARTICLE_COUNT = 4096;
  var DURATION = 7.0; /* total animation seconds */
  var dpr = Math.min(window.devicePixelRatio, 2);

  function resize(){
    canvas.width  = window.innerWidth  * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width  = window.innerWidth  + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── compile shader ── */
  function makeShader(src, type){
    var s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
      console.error(gl.getShaderInfoLog(s)); return null;
    }
    return s;
  }
  function makeProgram(vs, fs){
    var p = gl.createProgram();
    gl.attachShader(p, makeShader(vs, gl.VERTEX_SHADER));
    gl.attachShader(p, makeShader(fs, gl.FRAGMENT_SHADER));
    gl.linkProgram(p);
    return p;
  }

  /* ── vertex shader ── */
  var vertSrc = [
    'attribute vec2 aSeed;',
    'uniform float uTime;',
    'uniform float uPhase;', /* 0=reactor 1=burst 2=attract 3=ignite */
    'uniform vec2 uRes;',
    'uniform vec2 uZiaCenter;', /* normalized 0-1 */
    'uniform vec2 uTextCenter;',
    'varying float vLife;',
    'varying float vHeat;',
    '',
    '/* simplex-ish hash */',
    'float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }',
    '',
    'void main(){',
    '  float id = aSeed.x;',
    '  float seed = aSeed.y;',
    '  float angle0 = seed * 6.2832;',
    '  float radius0 = hash(vec2(id,seed)) * 0.12;',
    '',
    '  /* cardinal direction for this particle (0=top 1=right 2=bottom 3=left) */',
    '  int card = int(mod(id, 4.0));',
    '  vec2 cardDir = vec2(0.0, -1.0);', /* top */
    '  if(card==1) cardDir = vec2(1.0, 0.0);',   /* right */
    '  if(card==2) cardDir = vec2(0.0, 1.0);',    /* bottom */
    '  if(card==3) cardDir = vec2(-1.0, 0.0);',   /* left */
    '',
    '  /* phase timing */',
    '  float t = uTime;',
    '  float stagger = hash(vec2(id*3.7, seed*2.1)) * 0.4;',
    '',
    '  vec2 pos = uZiaCenter;',
    '  float heat = 0.0;',
    '  float life = 1.0;',
    '',
    '  /* PHASE 0: reactor core — swirl around center */',
    '  if(uPhase < 1.0){',
    '    float p0 = min(t / 2.0, 1.0);',
    '    float swirl = angle0 + t * (2.0 + seed * 3.0);',
    '    float r = radius0 * (0.3 + 0.7 * p0) * (0.8 + 0.4*sin(t*4.0+id));',
    '    pos += vec2(cos(swirl), sin(swirl)) * r;',
    '    heat = 0.5 + 0.5 * sin(t * 6.0 + id);',
    '    life = p0;',
    '  }',
    '',
    '  /* PHASE 1: cardinal burst — fly out through 4 rays */',
    '  if(uPhase >= 1.0 && uPhase < 2.0){',
    '    float p1 = min((t - 2.0 - stagger*0.3) / 1.2, 1.0);',
    '    p1 = max(p1, 0.0);',
    '    float eased = p1 * p1 * (3.0 - 2.0 * p1);', /* smoothstep */
    '    float spread = hash(vec2(id*1.3, seed*4.1)) * 0.06 - 0.03;',
    '    vec2 dir = cardDir + vec2(spread, spread);',
    '    pos = uZiaCenter + dir * eased * 0.45;',
    '    heat = 1.0 - eased * 0.3;',
    '    life = 1.0;',
    '  }',
    '',
    '  /* PHASE 2: attract to text */',
    '  if(uPhase >= 2.0 && uPhase < 3.0){',
    '    float p2 = min((t - 3.5 - stagger*0.5) / 1.5, 1.0);',
    '    p2 = max(p2, 0.0);',
    '    float eased = p2 * p2;',
    '    vec2 burstEnd = uZiaCenter + cardDir * 0.45;',
    '    float spreadX = hash(vec2(id*2.9, seed)) * 0.3 - 0.15;',
    '    vec2 textTarget = uTextCenter + vec2(spreadX, 0.0);',
    '    pos = mix(burstEnd, textTarget, eased);',
    '    heat = 0.7 + 0.3 * (1.0 - p2);',
    '    life = 1.0;',
    '  }',
    '',
    '  /* PHASE 3: ignite — particles at text, fading */',
    '  if(uPhase >= 3.0){',
    '    float p3 = min((t - 5.0) / 1.5, 1.0);',
    '    float spreadX = hash(vec2(id*2.9, seed)) * 0.3 - 0.15;',
    '    pos = uTextCenter + vec2(spreadX, 0.0);',
    '    pos += vec2(hash(vec2(t,id))-0.5, hash(vec2(id,t))-0.5) * 0.02 * (1.0-p3);',
    '    heat = 1.0;',
    '    life = 1.0 - p3;',
    '  }',
    '',
    '  /* NDC */',
    '  float aspect = uRes.x / uRes.y;',
    '  vec2 ndc = (pos - 0.5) * 2.0;',
    '  ndc.x /= aspect;',
    '',
    '  gl_Position = vec4(ndc, 0.0, 1.0);',
    '  gl_PointSize = (3.0 + heat * 5.0) * (uRes.y / 800.0);',
    '  vLife = life;',
    '  vHeat = heat;',
    '}'
  ].join('\n');

  /* ── fragment shader ── */
  var fragSrc = [
    'precision mediump float;',
    'varying float vLife;',
    'varying float vHeat;',
    '',
    'void main(){',
    '  vec2 c = gl_PointCoord - 0.5;',
    '  float d = length(c);',
    '  if(d > 0.5) discard;',
    '',
    '  /* soft circle with glow falloff */',
    '  float alpha = smoothstep(0.5, 0.1, d) * vLife;',
    '',
    '  /* color: cool teal → hot white-blue */',
    '  vec3 coolColor = vec3(0.15, 0.65, 0.9);',   /* teal */
    '  vec3 hotColor  = vec3(0.7, 0.95, 1.0);',     /* white-blue */
    '  vec3 coreColor = vec3(1.0, 1.0, 1.0);',      /* pure white */
    '  vec3 col = mix(coolColor, hotColor, vHeat);',
    '  col = mix(col, coreColor, smoothstep(0.3, 0.0, d) * vHeat);',
    '',
    '  /* bloom glow additive */',
    '  alpha += smoothstep(0.5, 0.0, d) * 0.3 * vHeat;',
    '',
    '  gl_FragColor = vec4(col * alpha, alpha);',
    '}'
  ].join('\n');

  var prog = makeProgram(vertSrc, fragSrc);
  gl.useProgram(prog);

  /* ── seed buffer ── */
  var seeds = new Float32Array(PARTICLE_COUNT * 2);
  for(var i=0; i<PARTICLE_COUNT; i++){
    seeds[i*2]   = i;                      /* id */
    seeds[i*2+1] = Math.random();          /* seed */
  }
  var seedBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, seedBuf);
  gl.bufferData(gl.ARRAY_BUFFER, seeds, gl.STATIC_DRAW);
  var aSeed = gl.getAttribLocation(prog, 'aSeed');
  gl.enableVertexAttribArray(aSeed);
  gl.vertexAttribPointer(aSeed, 2, gl.FLOAT, false, 0, 0);

  /* ── uniforms ── */
  var uTime = gl.getUniformLocation(prog, 'uTime');
  var uPhase = gl.getUniformLocation(prog, 'uPhase');
  var uRes = gl.getUniformLocation(prog, 'uRes');
  var uZiaCenter = gl.getUniformLocation(prog, 'uZiaCenter');
  var uTextCenter = gl.getUniformLocation(prog, 'uTextCenter');

  /* ── blending ── */
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE); /* additive for bloom */

  /* ── get element centers in normalized coords ── */
  function getCenter(el){
    var r = el.getBoundingClientRect();
    return [(r.left + r.width/2) / window.innerWidth,
            (r.top + r.height/2) / window.innerHeight];
  }

  /* ── percentage counter ── */
  var pct = 0;

  /* ── animation loop ── */
  var startTime = performance.now();
  var done = false;

  function tick(){
    if(done) return;
    var elapsed = (performance.now() - startTime) / 1000;

    /* update percentage */
    pct = Math.min(Math.floor((elapsed / DURATION) * 100), 100);
    pctEl.textContent = pct + '%';

    /* determine phase */
    var phase = 0;
    if(elapsed >= 2.0) phase = 1;
    if(elapsed >= 3.5) phase = 2;
    if(elapsed >= 5.0) phase = 3;

    /* text ignition at phase 3 */
    if(elapsed >= 4.8 && !textImg.classList.contains('lit')){
      textImg.classList.add('lit');
    }

    /* zia pulse intensity based on phase */
    if(phase >= 1 && phase < 3){
      zia.style.filter = 'drop-shadow(0 0 60px rgba(74,200,255,.9)) brightness(1.5)';
    }

    /* render */
    gl.clearColor(0, 0, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);

    var zc = getCenter(zia);
    var tc = getCenter(textImg);

    gl.uniform1f(uTime, elapsed);
    gl.uniform1f(uPhase, phase);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform2f(uZiaCenter, zc[0], zc[1]);
    gl.uniform2f(uTextCenter, tc[0], tc[1]);

    gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);

    /* end sequence */
    if(elapsed >= DURATION){
      done = true;
      screen.classList.add('done');
      setTimeout(function(){ screen.style.display = 'none'; }, 900);
      return;
    }
    requestAnimationFrame(tick);
  }

  /* preload images then start */
  var img1 = new Image(); img1.src = 'New Assets/Loading_Zia.png';
  var img2 = new Image(); img2.src = 'New Assets/Loading_Text.png';
  var loaded = 0;
  function checkStart(){ loaded++; if(loaded>=2) requestAnimationFrame(tick); }
  img1.onload = checkStart; img1.onerror = checkStart;
  img2.onload = checkStart; img2.onerror = checkStart;
  if(img1.complete) checkStart();
  if(img2.complete) checkStart();
})();
</script>
